<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>BlazePen Cinematic Decision Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="demo-shell" id="demoShell">
      <div class="grain-layer" aria-hidden="true"></div>
      <div class="vignette-layer" aria-hidden="true"></div>
      <div class="ghost-cursor" id="ghostCursor" aria-hidden="true"></div>

      <header class="demo-header">
        <div>
          <p class="eyebrow">BLAZEPEN // CINEMATIC DECISION DEMO</p>
          <h1>战地决策三选一 UI 原型</h1>
        </div>
        <div class="status-cluster" aria-live="polite">
          <div class="status-item">
            <span>模式</span>
            <strong>三选项镜头</strong>
          </div>
          <div class="status-item">
            <span>状态</span>
            <strong id="statusText">聚焦中央主选项</strong>
          </div>
        </div>
      </header>

      <main class="decision-stage is-center" id="decisionStage">
        <div class="background-bleed" aria-hidden="true">
          <video
            class="background-video"
            src="./assets/reference-strip.mp4"
            poster="./assets/reference-poster.png"
            autoplay
            muted
            loop
            playsinline
          ></video>
        </div>

        <section class="decision-band" aria-label="电影化三选项界面">
          <div class="band-shadow top" aria-hidden="true"></div>
          <div class="band-shadow bottom" aria-hidden="true"></div>

          <video
            class="reference-video"
            src="./assets/reference-strip.mp4"
            poster="./assets/reference-poster.png"
            autoplay
            muted
            loop
            playsinline
          ></video>

          <div class="beam-core" aria-hidden="true"></div>
          <div class="beam-fragments" aria-hidden="true"></div>
          <div class="scan-lines" aria-hidden="true"></div>
          <div class="reticle" id="reticle" aria-hidden="true">
            <span class="reticle-ring outer"></span>
            <span class="reticle-ring inner"></span>
            <span class="reticle-core"></span>
            <span class="reticle-axis horizontal"></span>
            <span class="reticle-axis vertical"></span>
          </div>

          <button
            class="choice-card choice-card--left"
            id="choiceLeft"
            data-index="0"
            data-status="聚焦左侧备选"
            data-pressure="61%"
            data-beam-shift="-10%"
            type="button"
          >
            <span class="choice-meta">OPTION 01</span>
            <strong class="choice-title">出自《忽尔今夏》</strong>
          </button>

          <button
            class="choice-card choice-card--top is-active"
            id="choiceCenter"
            data-index="1"
            data-status="聚焦中央主选项"
            data-pressure="74%"
            data-beam-shift="0%"
            type="button"
          >
            <span class="choice-meta">PRIMARY TRACK</span>
            <strong class="choice-title">出自《玫瑰的故事》</strong>
          </button>

          <button
            class="choice-card choice-card--right"
            id="choiceRight"
            data-index="2"
            data-status="聚焦右侧备选"
            data-pressure="83%"
            data-beam-shift="10%"
            type="button"
          >
            <span class="choice-meta">OPTION 03</span>
            <strong class="choice-title">尝试转移话题</strong>
          </button>

        </section>

        <aside class="review-panel">
          <div class="metric-card">
            <span class="metric-label">布局节奏</span>
            <strong>中央主选项 + 两侧备选</strong>
            <p>中间文案上移并放大，左右选项压到下沿，尽量贴近视频里“三点构图”的镜头感。</p>
          </div>
          <div class="metric-card">
            <span class="metric-label">交互状态</span>
            <strong>悬停 / 切换 / 锁定</strong>
            <p>鼠标悬停、键盘左右切换和确认态都已经同步到三选项逻辑，方便继续微调节奏和动画。</p>
          </div>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
